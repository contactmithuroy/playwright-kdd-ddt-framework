name: Playwright Automation Pipeline

# =========================================================

# TRIGGERS: Auto + Manual

# =========================================================

on:

# 🔹 Auto run on push

push:
branches: [ main, develop ]

# 🔹 Manual run with inputs

workflow_dispatch:
inputs:
test_type:
description: "Test Type (smoke / full)"
required: true
default: "smoke"
browser:
description: "Browser"
required: true
default: "chromium"

# =========================================================

# JOBS

# =========================================================

jobs:
test:
name: Run Playwright Tests
runs-on: ubuntu-latest

```
steps:
  # Step 1: Checkout repo
  - name: Checkout Code
    uses: actions/checkout@v4

  # Step 2: Setup Node
  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20

  # Step 3: Install dependencies
  - name: Install Dependencies
    run: npm ci

  # Step 4: Install Playwright browsers
  - name: Install Playwright Browsers
    run: npx playwright install --with-deps

  # Step 5: Create .env from secrets
  - name: Setup Environment
    run: |
      echo "USER_PORTAL_URL=${{ secrets.USER_PORTAL_URL }}" >> .env
      echo "USER_PORTAL_USERNAME=${{ secrets.USER_PORTAL_USERNAME }}" >> .env
      echo "USER_PORTAL_PASSWORD=${{ secrets.USER_PORTAL_PASSWORD }}" >> .env
      echo "TAKE_SCREENSHOTS=false" >> .env

  # Step 6: Run tests (auto + manual support)
  - name: Run Tests
    run: |
      if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
        echo "Running manual tests..."
        npx playwright test tests/${{ github.event.inputs.test_type }}
      else
        echo "Running default tests..."
        npx playwright test
      fi

  # Step 7: Upload Playwright report
  - name: Upload Playwright Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: playwright-report
      path: playwright-report/

  # Step 8: Upload custom results
  - name: Upload Custom Results
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: custom-results
      path: AllTestResults/
```
