name: Playwright Tests CI

on:

# Auto trigger on push

push:
branches: [ main, develop ]

# Auto trigger on PR

pull_request:
branches: [ main ]

# 🔹 Manual trigger from GitHub UI

workflow_dispatch:

jobs:
test:
name: Run Playwright Tests
runs-on: ubuntu-latest

```
steps:
  # Step 1: Checkout code
  - name: Checkout Repository
    uses: actions/checkout@v4

  # Step 2: Setup Node.js
  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  # Step 3: Install dependencies
  - name: Install Dependencies
    run: npm ci

  # Step 4: Install Playwright browsers
  - name: Install Playwright Browsers
    run: npx playwright install --with-deps

  # Step 5: Create .env file from secrets
  - name: Create Environment File
    run: |
      echo "USER_PORTAL_URL=${{ secrets.USER_PORTAL_URL }}" >> .env
      echo "USER_PORTAL_USERNAME=${{ secrets.USER_PORTAL_USERNAME }}" >> .env
      echo "USER_PORTAL_PASSWORD=${{ secrets.USER_PORTAL_PASSWORD }}" >> .env
      echo "TAKE_SCREENSHOTS=false" >> .env

  # Step 6: Run tests
  - name: Run Playwright Tests
    run: npx playwright test

  # Step 7: Upload Playwright report
  - name: Upload Playwright Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: playwright-report
      path: playwright-report/
      retention-days: 7

  # Step 8: Upload custom results
  - name: Upload Custom Results
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: custom-results
      path: AllTestResults/
      retention-days: 7
```
